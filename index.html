<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>勤務時間確認くん</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d60000">

<style>

*{ box-sizing:border-box; }

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    -webkit-text-size-adjust:100%;
}

.card{
    max-width:600px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    padding:24px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    overflow:hidden;
}

h1{
    text-align:center;
    margin:0 0 10px;
}

h2{
    font-size:20px;
    margin:0 0 12px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-bottom:24px;
}

.tool{
    border-top:1px solid #e5e5e5;
    padding-top:22px;
    margin-top:24px;
}

.tool:first-of-type{
    border-top:0;
    padding-top:0;
    margin-top:0;
}

label{
    display:block;
    font-weight:bold;
    margin-top:10px;
}

input[type="time"]{
    width:100%;
    padding:12px;
    font-size:24px;
    border:1px solid #ccc;
    border-radius:8px;
    -webkit-appearance:none;
    appearance:none;
}

.inputRow{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

button{
    width:100%;
    padding:14px;
    margin-top:16px;
    font-size:20px;
    border:none;
    border-radius:8px;
    background:#d60000;
    color:#fff;
    cursor:pointer;
}

button:active{
    transform:translateY(1px);
}

.result{
    text-align:center;
    margin-top:24px;
}

.timeRow{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    margin-bottom:10px;
}

.startTimeRounded{
    font-size:28px;
    color:#ff8c00;
    font-weight:bold;
}

.finish775,
.overtimeValue{
    font-size:38px;
    font-weight:bold;
    color:#d60000;
}

.warning{
    color:#d60000;
    font-weight:bold;
}

.note{
    color:#666;
    font-size:13px;
    line-height:1.6;
    margin-top:10px;
}

.info{
    margin-top:24px;
    border-top:1px solid #ccc;
    padding-top:20px;
    line-height:1.7;
}

.ruleTitle{
    font-weight:bold;
    margin-top:10px;
}

.footer{
    margin-top:30px;
    border-top:1px solid #eee;
    text-align:center;
    font-size:12px;
    color:#888;
    padding-top:15px;
}

@media (max-width:520px){
    body{ padding:12px; }
    .card{ padding:18px; }
    .inputRow{ grid-template-columns:1fr; gap:0; }
}

</style>
</head>

<body oncontextmenu="return false">

<div class="card">

<h1>勤務時間確認くん</h1>

<div class="subtitle">
7.75h到達時刻と残業時間を確認するツール
</div>

<section class="tool">
    <h2>7.75h終了時刻</h2>

    <label for="startTime">出勤時間</label>
    <input type="time" id="startTime">

    <button onclick="calculateFinishTime()">計算</button>

    <div class="result" id="result"></div>
    <div class="info" id="info"></div>
</section>

<section class="tool">
    <h2>残業時間計算くん</h2>

    <div class="inputRow">
        <div>
            <label for="overtimeStart">開始時間</label>
            <input type="time" id="overtimeStart">
        </div>
        <div>
            <label for="overtimeEnd">終了時間</label>
            <input type="time" id="overtimeEnd">
        </div>
    </div>

    <button onclick="calculateOvertime()">残業時間を計算</button>

    <div class="result" id="overtimeResult"></div>
    <div class="note">
        開始時間は15分切り上げ、終了時間は15分切り捨てで計算します。終了時間が開始時間より早い場合は日またぎとして扱います。
    </div>
</section>

<div class="footer">
修正依頼は山田まで。<br>
最終更新:26/06/16
</div>

</div>

<script>

const WORK_775 = 465;

const scheduleA = [
    ["08:45","09:00"],
    ["12:15","13:00"],
    ["17:45","18:00"],
    ["21:00","21:15"],
    ["01:00","01:15"],
    ["03:15","03:30"],
    ["05:30","05:45"],
    ["07:00","07:15"]
];

const scheduleB = [
    ["17:45","18:30"],
    ["21:00","21:15"],
    ["23:00","23:15"],
    ["01:00","01:15"],
    ["03:15","03:30"],
    ["05:30","05:45"],
    ["07:00","07:15"],
    ["08:45","09:00"]
];

function toMin(t){
    const [h,m] = t.split(":").map(Number);
    return h * 60 + m;
}

function fmt(m){
    m = (m % 1440 + 1440) % 1440;
    return String(Math.floor(m / 60)).padStart(2,"0") + ":" + String(m % 60).padStart(2,"0");
}

function fmtDuration(min){
    const h = Math.floor(min / 60);
    const m = min % 60;
    return `${h}時間${String(m).padStart(2,"0")}分`;
}

function fmtHours(min){
    return (min / 60).toFixed(2) + "h";
}

function roundUp15(min){
    return Math.ceil(min / 15) * 15;
}

function roundDown15(min){
    return Math.floor(min / 15) * 15;
}

function chooseBreaks(startMin){
    return startMin < 735 ? scheduleA : scheduleB;
}

function getBreakWindows(breaks, start, end){
    const windows = [];
    const seen = new Set();

    for(let d = -1; d <= 2; d++){
        for(const b of breaks){
            let s = toMin(b[0]) + d * 1440;
            let e = toMin(b[1]) + d * 1440;

            if(e <= s) e += 1440;
            while(e <= start){
                s += 1440;
                e += 1440;
            }

            if(s < end && e > start){
                const key = `${s}-${e}`;
                if(seen.has(key)) continue;
                seen.add(key);
                windows.push({ s, e, label:b });
            }
        }
    }

    return windows.sort((a,b) => a.s - b.s);
}

function calc(start,target,breaks){
    let work = 0;
    let cur = start;
    let usedBreaks = [];

    while(work < target){
        let next = null;

        for(const b of getBreakWindows(breaks, cur, cur + 2880)){
            if(b.s >= cur && (!next || b.s < next.s)){
                next = b;
            }
        }

        if(!next){
            cur += target - work;
            break;
        }

        const usable = next.s - cur;

        if(work + usable >= target){
            cur += target - work;
            work = target;
        }else{
            work += usable;
            usedBreaks.push(next.label);
            cur = next.e;
        }
    }

    return { time: cur, usedBreaks };
}

function calcWorkedMinutes(start,end,breaks){
    let finish = end;
    if(finish <= start) finish += 1440;

    let work = finish - start;
    const usedBreaks = [];

    for(const b of getBreakWindows(breaks, start, finish)){
        const overlap = Math.max(0, Math.min(finish, b.e) - Math.max(start, b.s));
        if(overlap > 0){
            work -= overlap;
            usedBreaks.push(b.label);
        }
    }

    return { work:Math.max(0, work), finish, usedBreaks };
}

function calculateFinishTime(){
    let start = document.getElementById("startTime").value;
    if(!start) return;

    let sm = roundUp15(toMin(start));
    const breaks = chooseBreaks(sm);
    const useA = breaks === scheduleA;

    const res775 = calc(sm, WORK_775, breaks);
    const f775 = res775.time;

    document.getElementById("result").innerHTML = `
        <div>本日の7.75h</div>

        <div class="timeRow">
            <div class="startTimeRounded">${fmt(sm)} →</div>
            <div class="finish775">${fmt(f775)}</div>
        </div>

        <div class="warning">※ ${fmt(f775)}以降は残業対象</div>
    `;

    const pattern = useA
        ? "パターンA（0:00～12:14出勤）"
        : "パターンB（12:15～23:59出勤）";

    document.getElementById("info").innerHTML = `
        <div class="ruleTitle">適用ルール</div>
        ${pattern}

        <br><br>

        <div class="ruleTitle">実際に使用した休憩</div>
        ${res775.usedBreaks.length
            ? res775.usedBreaks.map(b => b[0] + " ～ " + b[1]).join("<br>")
            : "休憩なし"}
    `;
}

function calculateOvertime(){
    const start = document.getElementById("overtimeStart").value;
    const end = document.getElementById("overtimeEnd").value;

    if(!start || !end) return;

    const sm = roundUp15(toMin(start));
    const em = roundDown15(toMin(end));
    const breaks = chooseBreaks(sm);
    const res = calcWorkedMinutes(sm, em, breaks);
    const overtime = Math.max(0, res.work - WORK_775);

    document.getElementById("overtimeResult").innerHTML = `
        <div>実働 ${fmtDuration(res.work)}</div>
        <div class="timeRow">
            <div class="startTimeRounded">${fmt(sm)} → ${fmt(res.finish)}</div>
        </div>
        <div>残業時間</div>
        <div class="overtimeValue">${fmtDuration(overtime)}（${fmtHours(overtime)}）</div>
        <div class="note">
            差し引いた休憩:
            ${res.usedBreaks.length
                ? res.usedBreaks.map(b => b[0] + " ～ " + b[1]).join("、")
                : "なし"}
        </div>
    `;
}

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
